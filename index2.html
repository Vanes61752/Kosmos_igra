<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Certificate System</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --deep-space: #020205;
        }

        * {
            box-sizing: border-box;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--deep-space);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Анимированный фон со звездами */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        .container {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 
                        inset 0 0 20px rgba(0, 243, 255, 0.05);
            max-width: 900px;
            width: 95%;
        }

        h1 {
            text-align: center;
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #000;
        }

        .ui-panel {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-box {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-purple);
            padding: 15px 20px;
            color: white;
            font-size: 1.1rem;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        button {
            background: linear-gradient(45deg, var(--neon-purple), #6a00ff);
            border: none;
            color: white;
            padding: 0 30px;
            height: 54px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(157, 0, 255, 0.4);
            filter: brightness(1.2);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* Декоративные уголки */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-cyan);
        }
        .tl { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .tr { top: -5px; right: -5px; border-left: none; border-bottom: none; }
        .bl { bottom: -5px; left: -5px; border-right: none; border-top: none; }
        .br { bottom: -5px; right: -5px; border-left: none; border-top: none; }

    </style>
</head>
<body>

<div class="stars-bg"></div>

<div class="container">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <h1>Сертификат</h1>

    <div class="canvas-wrapper">
        <canvas id="certCanvas"></canvas>
    </div>

    <div class="ui-panel">
        <div class="input-box">
            <input type="text" id="nameInput" placeholder="ВВЕДИТЕ ИМЯ УЧАСТНИКА..." maxlength="40">
        </div>
        <button id="downloadBtn" disabled>СКАЧАТЬ</button>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const downloadBtn = document.getElementById('downloadBtn');

        // Фиксированные настройки по вашему запросу
        const CONFIG = {
            x: 506,
            y: 771,
            fontSize: 40,
            color: 'black',
            font: 'bold 40px "Georgia", serif',
            imgUrl: 'https://raw.githubusercontent.com/Vanes61752/Kosmos_igra/refs/heads/main/o8VlzVaHvhdN_uVT2llctCVlRQq-5V0vUlCgKix_NsPUbSbLbxW8PO8BAurKOPQj9WbDMbN9rLS0N5r6RCO_x4hK.jpg.jpeg'
        };

        let bgImage = new Image();
        let isReady = false;

        function init() {
            bgImage.crossOrigin = "anonymous";
            bgImage.src = CONFIG.imgUrl;

            bgImage.onload = () => {
                canvas.width = bgImage.width;
                canvas.height = bgImage.height;
                isReady = true;
                downloadBtn.disabled = false;
                updatePreview();
            };

            bgImage.onerror = () => {
                console.error("Ошибка загрузки фонового изображения.");
            };
        }

        function updatePreview() {
            if (!isReady) return;

            // Отрисовка фона
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImage, 0, 0);

            // Отрисовка текста
            const name = nameInput.value.trim();
            if (name) {
                ctx.font = CONFIG.font;
                ctx.fillStyle = CONFIG.color;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Рисуем текст по вашим координатам
                ctx.fillText(name, CONFIG.x, CONFIG.y);
            }
        }

        nameInput.addEventListener('input', updatePreview);

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            const ts = new Date().getTime();
            link.download = `Certificate_${ts}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        init();
    })();
</script>

</body>
</html>
