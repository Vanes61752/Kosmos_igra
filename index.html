<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космо-Квест: Покорители Галактики</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ea;
            --engine-fire: #ffaa00;
            --glass-bg: rgba(10, 15, 30, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            background: #020308;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white; overflow: hidden;
            user-select: none;
        }

        /* Глубокий космос со звездами */
        #space-bg {
            position: fixed; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/e0/Deep_field.jpg') center/cover;
            opacity: 0.3; z-index: 1;
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle var(--t) infinite alternate ease-in-out;
            box-shadow: 0 0 5px white;
        }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

        /* Игровая карта */
        #universe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3;
        }

        /* Маршрут */
        #route-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }

        /* Солнце - Стартовая база */
        #sun {
            position: absolute; left: -5%; top: 50%;
            width: 300px; height: 300px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/b/b4/The_Sun_by_the_Atmospheric_Imaging_Assembly_of_NASA%27s_Solar_Dynamics_Observatory_-_20100819.jpg') center/cover;
            border-radius: 50%; transform: translateY(-50%);
            box-shadow: 0 0 100px #ff6600, inset 0 0 50px #ffcc00;
            animation: pulse 4s infinite alternate;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 80px #ff6600; } 100% { box-shadow: 0 0 130px #ffcc00; } }

        /* Планеты */
        .planet {
            position: absolute; border-radius: 50%; cursor: pointer;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.8), 0 0 15px rgba(255,255,255,0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.4s;
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: flex-end;
            filter: grayscale(100%) brightness(0.4);
            z-index: 5;
        }

        .planet.active {
            filter: grayscale(0%) brightness(1);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.8), 0 0 30px var(--neon-blue);
            animation: float 3s infinite ease-in-out;
        }
        .planet.completed { filter: grayscale(0%) brightness(0.6); }
        .planet:hover.active { transform: translate(-50%, -50%) scale(1.3); }

        .planet span {
            position: absolute; bottom: -35px; background: rgba(0,0,0,0.7);
            padding: 4px 10px; border-radius: 8px; font-size: 14px;
            font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            border: 1px solid var(--neon-blue); color: white;
            text-shadow: 0 0 5px var(--neon-blue); pointer-events: none;
        }

        @keyframes float { 0%, 100% { margin-top: 0; } 50% { margin-top: -10px; } }

        /* Текстуры и позиции планет */
        #p0 { width: 45px; height: 45px; left: 18%; top: 30%; background: url('https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg') center/cover; }
        #p1 { width: 65px; height: 65px; left: 28%; top: 65%; background: url('https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg') center/cover; }
        #p2 { width: 75px; height: 75px; left: 40%; top: 35%; background: url('https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg') center/cover; }
        #p3 { width: 55px; height: 55px; left: 52%; top: 70%; background: url('https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg') center/cover; }
        #p4 { width: 130px; height: 130px; left: 68%; top: 35%; background: url('https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg') center/cover; }
        #p5 { width: 110px; height: 110px; left: 82%; top: 75%; background: url('https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg') center/cover; }
        #p5::after { content: ''; position: absolute; top: 50%; left: 50%; width: 190%; height: 35%; border: 12px solid rgba(220, 200, 150, 0.7); border-radius: 50%; transform: translate(-50%, -50%) rotate(20deg); box-shadow: 0 0 15px rgba(220, 200, 150, 0.5); pointer-events: none; }
        #p6 { width: 90px; height: 90px; left: 93%; top: 40%; background: url('https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg') center/cover; }

        /* ВЕКТОРНАЯ РАКЕТА */
        #rocket-container {
            position: absolute; width: 60px; height: 60px; z-index: 10;
            /* Ракета изначально спрятана далеко за верхним краем экрана */
            left: 50%; top: -150px; 
            transform: translate(-50%, -50%);
            transition: all 1.8s cubic-bezier(0.42, 0, 0.2, 1);
            pointer-events: none; filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        #rocket-sprite { width: 100%; height: 100%; transition: transform 0.6s ease; }

        .exhaust {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 30px;
            background: linear-gradient(to bottom, var(--engine-fire), #ff0000, transparent);
            border-radius: 50%; filter: blur(2px); opacity: 0; transition: opacity 0.3s;
        }

        .moving .exhaust { opacity: 1; animation: flicker 0.05s infinite alternate; }
        @keyframes flicker { 0% { height: 25px; opacity: 0.8; } 100% { height: 40px; opacity: 1; } }

        /* Интерфейс (Glassmorphism) */
        .glass-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--neon-blue);
            padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 20px var(--neon-blue);
            z-index: 100; text-align: center; max-width: 500px; display: none;
        }

        .glass-panel.show { display: block; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        h2 { margin-top: 0; color: var(--neon-blue); font-size: 28px; text-transform: uppercase; }
        p { font-size: 18px; line-height: 1.5; }

        .btn {
            background: rgba(0, 243, 255, 0.1); color: white;
            border: 1px solid var(--neon-blue); padding: 12px 25px; margin: 10px;
            border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; font-weight: bold; width: 90%;
        }
        .btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }

        .fact-text { color: #ffeb3b; font-style: italic; margin-top: 20px; display: none; font-size: 16px; }

        /* Мини-игра */
        #minigame {
            display: none; position: fixed; inset: 0; z-index: 200; cursor: crosshair;
            background: radial-gradient(circle at top, #1a0b2e, #000);
        }
        #mg-hud {
            position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold;
            color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);
        }
        .alien { position: absolute; font-size: 50px; cursor: crosshair; transition: transform 0.1s; }
        .alien:active { transform: scale(0.7); }
    </style>
</head>
<body>

    <div id="space-bg"></div>
    
    <svg id="route-svg">
        <polyline id="route-line" fill="none" stroke="rgba(0, 243, 255, 0.2)" stroke-width="3" stroke-dasharray="15,10"/>
    </svg>

    <div id="universe">
        <div id="sun"></div>
        <div class="planet" id="p0" onclick="openQuiz(0)"><span>Меркурий</span></div>
        <div class="planet" id="p1" onclick="openQuiz(1)"><span>Венера</span></div>
        <div class="planet" id="p2" onclick="openQuiz(2)"><span>Земля</span></div>
        <div class="planet" id="p3" onclick="openQuiz(3)"><span>Марс</span></div>
        <div class="planet" id="p4" onclick="openQuiz(4)"><span>Юпитер</span></div>
        <div class="planet" id="p5" onclick="openQuiz(5)"><span>Сатурн</span></div>
        <div class="planet" id="p6" onclick="openQuiz(6)"><span>Уран</span></div>

        <div id="rocket-container">
            <div id="rocket-sprite">
                <svg viewBox="0 0 50 80" width="100%" height="100%">
                    <path d="M25 0 C10 20 10 50 10 60 L40 60 C40 50 40 20 25 0" fill="#ffffff" />
                    <circle cx="25" cy="30" r="6" fill="#00f3ff" stroke="#333" stroke-width="2"/>
                    <path d="M10 50 L0 75 L15 65 Z" fill="#ff00ea" />
                    <path d="M40 50 L50 75 L35 65 Z" fill="#ff00ea" />
                    <rect x="20" y="60" width="10" height="8" fill="#555" />
                </svg>
                <div class="exhaust"></div>
            </div>
        </div>
    </div>

    <div id="intro" class="glass-panel show">
        <h2>🚀 Космо-Квест</h2>
        <p>Командир, наша миссия — исследовать Солнечную систему.</p>
        <p>Твой корабль ждет на орбите. Приготовься к гиперпрыжку на стартовую базу — к Солнцу!</p>
        <button class="btn" onclick="startEpicJourney()">Начать полет</button>
    </div>

    <div id="quiz-ui" class="glass-panel">
        <h2 id="q-title">Планета</h2>
        <p id="q-text">Вопрос</p>
        <div id="q-options"></div>
        <div id="fact-section">
            <p id="fact-text" class="fact-text"></p>
            <button id="next-btn" class="btn" style="display:none;" onclick="nextPlanet()">Летим дальше!</button>
        </div>
    </div>

    <div id="minigame">
        <div id="mg-hud">
            <div>Уничтожено: <span id="score">0</span> / 15</div>
            <div>Время: <span id="timer">20</span> сек</div>
        </div>
    </div>

    <script>
        const planetsData = [
            { id: "p0", name: "Меркурий", q: "Какая планета ближе всего к Солнцу?", opts: ["Венера", "Меркурий", "Земля"], ans: 1, fact: "Днем на Меркурии +430°C, а ночью -180°C. Там нет атмосферы, чтобы удерживать тепло!" },
            { id: "p1", name: "Венера", q: "Какую планету называют 'Сестрой Земли' из-за похожего размера?", opts: ["Марс", "Уран", "Венера"], ans: 2, fact: "Венера вращается в обратную сторону. Солнце там встает на западе, а садится на востоке." },
            { id: "p2", name: "Земля", q: "Как называется естественный спутник нашей планеты?", opts: ["Луна", "Европа", "Титан"], ans: 0, fact: "Земля — единственная планета, названная не в честь римских или греческих богов." },
            { id: "p3", name: "Марс", q: "Какого цвета песок и скалы на Марсе?", opts: ["Синего", "Красного", "Зеленого"], ans: 1, fact: "Красный цвет Марсу придает оксид железа — обычная ржавчина!" },
            { id: "p4", name: "Юпитер", q: "Какая планета является самой большой?", opts: ["Юпитер", "Сатурн", "Солнце (это звезда)"], ans: 0, fact: "Юпитер — это газовый гигант. У него нет твердой поверхности, на которую можно приземлиться." },
            { id: "p5", name: "Сатурн", q: "Что делает Сатурн таким особенным?", opts: ["Он квадратный", "У него огромные кольца", "Он светится"], ans: 1, fact: "Сатурн такой легкий, что если бы существовал гигантский бассейн, планета бы плавала на воде!" },
            { id: "p6", name: "Уран", q: "Какая планета самая холодная?", opts: ["Нептун", "Уран", "Плутон (карликовая)"], ans: 1, fact: "Уран вращается, 'лежа на боку'. Ученые думают, что давно он столкнулся с огромным метеоритом." }
        ];

        let currentLevel = 0;
        const rocket = document.getElementById('rocket-container');
        const sprite = document.getElementById('rocket-sprite');

        // Создаем звезды
        for(let i=0; i<150; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random()*100 + '%';
            s.style.top = Math.random()*100 + '%';
            let size = Math.random()*3;
            s.style.width = size+'px'; s.style.height = size+'px';
            s.style.setProperty('--t', (1+Math.random()*3)+'s');
            document.getElementById('space-bg').appendChild(s);
        }

        // Отрисовка линии маршрута
        function drawRoute() {
            const polyline = document.getElementById('route-line');
            const sun = document.getElementById('sun');
            let points = `${sun.offsetLeft + sun.clientWidth/2},${sun.offsetTop + sun.clientHeight/2} `;
            planetsData.forEach(p => {
                const el = document.getElementById(p.id);
                points += `${el.offsetLeft + el.clientWidth/2},${el.offsetTop + el.clientHeight/2} `;
            });
            polyline.setAttribute("points", points);
        }
        window.addEventListener('resize', drawRoute);

        // ЭПИЧНЫЙ СТАРТ СВЕРХУ
        function startEpicJourney() {
            document.getElementById('intro').classList.remove('show');
            drawRoute();
            
            // Направляем ракету на Солнце
            flyToElement('sun', () => {
                // После прилета на Солнце активируем первую планету
                document.getElementById('p0').classList.add('active');
            });
        }

        // Универсальная функция полета (вычисляет угол и летит)
        function flyToElement(targetId, callback) {
            const target = document.getElementById(targetId);
            const tRect = target.getBoundingClientRect();
            const rRect = rocket.getBoundingClientRect();

            // Координаты центра цели
            const tx = tRect.left + tRect.width/2;
            const ty = tRect.top + tRect.height/2;

            // Координаты центра ракеты (текущие)
            const rx = rRect.left + rRect.width/2;
            const ry = rRect.top + rRect.height/2;

            // Высчитываем угол поворота в градусах
            const dx = tx - rx;
            const dy = ty - ry;
            // +90 градусов, потому что SVG ракета изначально нарисована носом вверх
            const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;

            // Сначала поворачиваем ракету
            sprite.style.transform = `rotate(${angle}deg)`;
            
            // Включаем двигатели и летим (небольшая задержка, чтобы успела повернуться)
            setTimeout(() => {
                rocket.classList.add('moving');
                rocket.style.left = tx + 'px';
                rocket.style.top = ty + 'px';

                // Выключаем двигатели, когда прилетела (время совпадает с transition в CSS)
                setTimeout(() => {
                    rocket.classList.remove('moving');
                    if(callback) callback();
                }, 1800);
            }, 300);
        }

        function openQuiz(index) {
            if (index !== currentLevel) return; // Защита от кликов по неактивным планетам

            flyToElement(`p${index}`, () => {
                // Когда прилетели - показываем вопрос
                const data = planetsData[index];
                document.getElementById('q-title').innerText = data.name;
                document.getElementById('q-text').innerText = data.q;
                document.getElementById('fact-text').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
                
                const optsContainer = document.getElementById('q-options');
                optsContainer.innerHTML = '';
                
                data.opts.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        if (i === data.ans) {
                            btn.style.background = "#00ff00"; btn.style.color = "#000";
                            optsContainer.querySelectorAll('button').forEach(b => b.disabled = true);
                            document.getElementById('fact-text').innerText = "✨ " + data.fact;
                            document.getElementById('fact-text').style.display = 'block';
                            document.getElementById('next-btn').style.display = 'inline-block';
                        } else {
                            btn.style.background = "red"; btn.style.color = "white";
                            setTimeout(() => btn.style.background = "", 500);
                        }
                    };
                    optsContainer.appendChild(btn);
                });

                document.getElementById('quiz-ui').classList.add('show');
            });
        }

        function nextPlanet() {
            document.getElementById('quiz-ui').classList.remove('show');
            document.getElementById(`p${currentLevel}`).classList.replace('active', 'completed');
            
            currentLevel++;

            if (currentLevel < planetsData.length) {
                document.getElementById(`p${currentLevel}`).classList.add('active');
            } else {
                setTimeout(() => {
                    document.getElementById('intro').innerHTML = `
                        <h2>ВНИМАНИЕ! РАДАРЫ СХОДЯТ С УМА!</h2>
                        <p>Вы покинули пределы Солнечной системы. Нас атакует рой космических пиратов!</p>
                        <button class="btn" style="background: var(--neon-pink); font-size: 20px;" onclick="startMinigame()">ВКЛЮЧИТЬ ЛАЗЕРЫ</button>
                    `;
                    document.getElementById('intro').classList.add('show');
                }, 1000);
            }
        }

        // === МИНИ-ИГРА ===
        let mgScore = 0, mgTime = 20, spawnInterval, timerInterval;

        function startMinigame() {
            document.getElementById('intro').classList.remove('show');
            document.getElementById('minigame').style.display = 'block';
            mgScore = 0; mgTime = 20;
            
            document.getElementById('score').innerText = mgScore;
            document.getElementById('timer').innerText = mgTime;

            spawnInterval = setInterval(createAlien, 500); // Пришельцы падают каждые 0.5 сек
            timerInterval = setInterval(() => {
                mgTime--;
                document.getElementById('timer').innerText = mgTime;
                if (mgTime <= 0) endGame(false);
            }, 1000);
        }

        function createAlien() {
            const mg = document.getElementById('minigame');
            const alien = document.createElement('div');
            alien.className = 'alien';
            const types = ['🛸', '👾', '☄️'];
            alien.innerText = types[Math.floor(Math.random() * types.length)];
            alien.style.left = Math.random() * 90 + '%';
            alien.style.top = '-50px';
            mg.appendChild(alien);

            let pos = -50;
            const speed = 3 + Math.random() * 4;
            
            const fall = setInterval(() => {
                pos += speed;
                alien.style.top = pos + 'px';
                if (pos > window.innerHeight) { clearInterval(fall); alien.remove(); }
            }, 20);

            alien.onmousedown = () => {
                mgScore++;
                document.getElementById('score').innerText = mgScore;
                alien.innerText = '💥';
                clearInterval(fall);
                setTimeout(() => alien.remove(), 150);
                if (mgScore >= 15) endGame(true);
            };
        }

        function endGame(win) {
            clearInterval(spawnInterval); clearInterval(timerInterval);
            document.querySelectorAll('.alien').forEach(a => a.remove());
            
            if (win) {
                alert("УРА! Путь свободен. Совершаем гиперпрыжок!");
                window.location.href = "index2.html"; // Тот самый переход
            } else {
                alert("Щиты пробиты! Придется попробовать еще раз.");
                startMinigame(); // Рестарт
            }
        }
    </script>
</body>
</html>
